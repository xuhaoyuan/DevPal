name: DevPal
options:
  bundleIdPrefix: com.devpal
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  DevPal:
    type: application
    platform: macOS
    sources:
      - path: DevPal
        excludes:
          - "**/*.md"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.devpal.app
        PRODUCT_NAME: DevPal
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: DevPal/DevPal.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        INFOPLIST_KEY_CFBundleDisplayName: DevPal
        INFOPLIST_KEY_SUFeedURL: "https://github.com/xuhaoyuan/DevPal/releases/latest/download/appcast.xml"
        ENABLE_APP_SANDBOX: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
